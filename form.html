<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    />

    <title>Booking Sheet — Fill Row</title>

    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    <script src="common.js"></script>

    <style>
        :root {
            --bg: #f5f7fb;
            --card: #ffffff;
            --text: #1f2937;
            --muted: #6b7280;
            --line: #e5e7eb;
            --brand: #2563eb;
            --brand-hover: #1d4ed8;
            --success: #16a34a;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 12px;
            font-family: "Segoe UI", Calibri, sans-serif;
            color: var(--text);
            background: var(--bg);
        }

        .shell {
            max-width: 460px;
            margin: 0 auto;
            overflow: hidden;
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 12px;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.06);
        }

        .header {
            padding: 14px 16px;
            background: #f8fbff;
            border-bottom: 1px solid var(--line);
        }

        .title {
            margin: 0;
            font-size: 16px;
            font-weight: 700;
        }

        .subtitle {
            margin: 4px 0 0;
            font-size: 12px;
            color: var(--muted);
        }

        .section {
            padding: 12px 14px;
            border-bottom: 1px solid var(--line);
        }

        .section:last-of-type {
            border-bottom: 0;
        }

        .section h4 {
            margin: 0 0 10px;
            font-size: 12px;
            letter-spacing: 0.02em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .field {
            margin-bottom: 10px;
        }

        .field:last-child {
            margin-bottom: 0;
        }

        label {
            display: block;
            margin-bottom: 4px;
            font-size: 12px;
            font-weight: 600;
        }

        input,
        select {
            width: 100%;
            padding: 9px 10px;
            font-size: 13px;
            background: #fff;
            border: 1px solid #d1d5db;
            border-radius: 8px;
        }

        input[readonly] {
            color: #374151;
            background: #f3f4f6;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .footer {
            position: sticky;
            bottom: 0;
            padding: 12px 14px 14px;
            background: #fff;
            border-top: 1px solid var(--line);
        }

        button {
            width: 100%;
            padding: 11px 12px;
            font-size: 14px;
            font-weight: 600;
            color: #fff;
            cursor: pointer;
            background: var(--brand);
            border: 0;
            border-radius: 10px;
        }

        button:hover {
            background: var(--brand-hover);
        }

        button:disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }

        .toast {
            display: none;
            margin-top: 8px;
            padding: 8px 10px;
            font-size: 12px;
            text-align: center;
            color: var(--success);
            background: #ecfdf3;
            border: 1px solid #bbf7d0;
            border-radius: 8px;
        }

        .hint {
            margin-top: 6px;
            font-size: 11px;
            color: var(--muted);
        }

        .diag {
            margin: 8px 0 0;
            padding: 8px 10px;
            max-height: 160px;
            overflow: auto;
            font-size: 11px;
            color: #374151;
            white-space: pre-wrap;
            word-break: break-word;
            background: #fafafa;
            border: 1px dashed #d1d5db;
            border-radius: 8px;
        }

        .diag-toggle {
            display: inline-block;
            margin-top: 6px;
            font-size: 11px;
            color: var(--brand);
            cursor: pointer;
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="shell">
        <div class="header">
            <h3 class="title">Fill Row</h3>

            <p class="subtitle">
                Single-entry booking form (Excel Task Pane)
            </p>
        </div>

        <div class="section">
            <h4>Assignment</h4>

            <div class="field">
                <label for="user">User</label>

                <select id="user">
                    <option value="">Select User</option>
                </select>
            </div>

            <div class="field">
                <label for="client">Client</label>

                <select id="client">
                    <option value="">Select Client</option>
                </select>
            </div>

            <div class="grid-2">
                <div class="field">
                    <label for="clientCode">
                        Client ID
                    </label>

                    <input
                        type="text"
                        id="clientCode"
                        readonly
                    />
                </div>

                <div class="field">
                    <label for="pod">POD</label>

                    <input
                        type="text"
                        id="pod"
                        readonly
                    />
                </div>
            </div>

            <div class="field">
                <label for="sensitivity">
                    Sensitivity
                </label>

                <input
                    type="text"
                    id="sensitivity"
                    readonly
                />
            </div>
        </div>

        <!-- Remaining sections continue... -->
    </div>
</body>
</html>
